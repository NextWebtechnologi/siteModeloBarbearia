<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbearia Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0f0f0f;color:white;overflow-x:hidden}
header{
position:fixed;
width:100%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 40px;
z-index:1000
}
.logo{
width:60px;height:60px;border-radius:50%;background:url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438') center/cover
}
nav button{
margin-left:10px;
padding:10px 20px;
border:none;
border-radius:30px;
background:#1f1f1f;
color:white;
cursor:pointer;
transition:0.3s
}
nav button:hover{
transform:scale(1.1);
background:#ff7a18
}
.section{
min-height:100vh;
display:none;
padding:120px 40px
}
.active{display:block}
.hero{
background:url('https://images.unsplash.com/photo-1517832606299-7ae9b720a186') center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center
}
.hero h1{font-size:60px;background:linear-gradient(90deg,#ff7a18,#ffd200);-webkit-background-clip:text;color:transparent}
.cards{
display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-top:40px
}
.card{
background:#1a1a1a;
padding:20px;
border-radius:15px;
transition:0.3s
}
.card:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 10px 30px rgba(255,122,24,0.4)
}
.banner{
height:300px;
background:url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1') center/cover;
border-radius:20px;
margin-top:30px
}
footer{text-align:center;padding:30px;background:#111}

.social-buttons{
display:flex;
gap:20px;
margin-top:30px;
flex-wrap:wrap
}

.social{
padding:15px 25px;
border-radius:40px;
text-decoration:none;
color:white;
font-size:18px;
background:#1f1f1f;
transition:0.3s;
display:inline-block
}

.social:hover{
transform:scale(1.1) translateY(-3px);
box-shadow:0 10px 25px rgba(255,122,24,0.5)
}

.whatsapp:hover{background:#25D366}
.instagram:hover{background:#E4405F}
.facebook:hover{background:#1877F2}
#particles{
position:fixed;
width:100%;height:100%;z-index:-1
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<header>
<div class="logo"></div>
<nav>
<button onclick="abrir('home')">Home</button>
<button onclick="abrir('servicos')">Serviços</button>
<button onclick="abrir('galeria')">Galeria</button>
<button onclick="abrir('contato')">Contato</button>
</nav>
</header>

<section id="home" class="section hero active">
<div>
<h1>Barbearia Premium</h1>
<p>Cortes modernos e estilo profissional</p>
<div class="banner"></div>
</div>
</section>

<section id="servicos" class="section">
<h2>Serviços</h2>
<div class="cards">
<div class="card">Corte Masculino</div>
<div class="card">Barba</div>
<div class="card">Sobrancelha</div>
<div class="card">Corte + Barba</div>
</div>
</section>

<section id="galeria" class="section">
<h2>Galeria</h2>
<div class="cards">
<div class="card">Foto 1</div>
<div class="card">Foto 2</div>
<div class="card">Foto 3</div>
</div>
</section>

<section id="contato" class="section">
<h2>Contato</h2>
<p>Fale com a nossa barbearia pelas redes sociais:</p>

<div class="social-buttons">

<a class="social whatsapp" href="https://wa.me/5500000000000" target="_blank">💬 WhatsApp</a>

<a class="social instagram" href="https://instagram.com" target="_blank">📸 Instagram</a>

<a class="social facebook" href="https://facebook.com" target="_blank">📘 Facebook</a>

</div>

</section>

<footer>
Barbearia Premium © 2026
</footer>

<script>
function abrir(sec){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'))
document.getElementById(sec).classList.add('active')
}

const canvas=document.getElementById('particles')
const ctx=canvas.getContext('2d')
canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]
for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
})
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height)
particles.forEach(p=>{
ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fillStyle='white'
ctx.fill()

p.x+=p.dx
p.y+=p.dy

if(p.x<0||p.x>canvas.width)p.dx*=-1
if(p.y<0||p.y>canvas.height)p.dy*=-1
})
requestAnimationFrame(draw)
}

draw()
</script>

</body>
</html>
